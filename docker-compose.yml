services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: fleet-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: fleet
      POSTGRES_USER: fleet_user
      POSTGRES_PASSWORD: fleet_password
    ports:
      - "5432:5432"          # also exposed so you can connect with a DB client
    volumes:
      - fleet-db-data:/var/lib/postgresql/data
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleet_user -d fleet"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Fleet Application ───────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fleet-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: jdbc:postgresql://db:5432/fleet
      DB_USERNAME: fleet_user
      DB_PASSWORD: fleet_password
    depends_on:
      db:
        condition: service_healthy

volumes:
  fleet-db-data:
