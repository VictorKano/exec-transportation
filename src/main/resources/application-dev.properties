# Dev profile — PostgreSQL running in Docker (docker compose up)
spring.application.name=fleet

# Points to the Dockerised Postgres (service name "db" resolves inside Docker,
# localhost:5432 works when connecting from the host machine directly)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/fleet}
spring.datasource.username=${DB_USERNAME:fleet_user}
spring.datasource.password=${DB_PASSWORD:fleet_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Verbose logging for development
logging.level.com.example.fleet=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
