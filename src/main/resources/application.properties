# Spring Boot Application Configuration
spring.application.name=fleet

# Database Configuration
# DB_URL defaults to localhost so the app can still be run outside Docker if needed
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/fleet}
spring.datasource.username=${DB_USERNAME:fleet_user}
spring.datasource.password=${DB_PASSWORD:fleet_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Logging Configuration
logging.level.com.example.fleet=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
